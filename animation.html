<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Animation</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  
  <style>
    body, html { margin:0; padding:0; height:100%; background: #000; overflow: hidden; }
    #ascii-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="ascii-container"></div>

  <script src="ascii-text.js"></script>
  <script>
    const container = document.getElementById('ascii-container');
    
    const asciiAnimation = new ASCIIText(container, {
      text: "derfbit",        // ← Change this to whatever text you want
      asciiFontSize: 9,
      textFontSize: 220,
      enableWaves: true,
      textColor: "#fdf9f3"
    });

    asciiAnimation.init();
  </script>

</body>
</html>
