<!DOCTYPE html>

<head>

<body>

<canvas id="starCanvas"></canvas>

<div class="card">
    <div class="profile-frame">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3a/SpongeBob_SquarePants_character.svg/1200px-SpongeBob_SquarePants_character.svg.png" class="pfp" alt="peanutman180-max">
    </div>

    <h1>peanutman180-max</h1>

    <p>come on fight me!!</p>
<!-- TikTok & Discord Copy Buttons -->
<style>
  .social-buttons { display: flex; flex-direction: column; gap: 12px; }
  .copy-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-radius: 12px;
    border: 1px solid #e0e0e0; background: #fff;
    cursor: pointer; font-size: 15px; font-weight: 500;
    color: #111; transition: background 0.15s;
  }
  .copy-btn:hover { background: #f5f5f5; }
  .icon-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .tiktok-icon { background: #010101; }
  .discord-icon { background: #5865F2; }
  .btn-label { flex: 1; text-align: left; }
  .btn-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .copy-feedback { font-size: 12px; color: #22c55e; opacity: 0; transition: opacity 0.2s; }
  .copy-feedback.show { opacity: 1; }
</style>

<div class="social-buttons">
  <button class="copy-btn" onclick="copyUser('tiktok', '@.cuverp', this)">
    <div class="icon-circle tiktok-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.36 6.36 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.73a4.85 4.85 0 0 1-1.01-.04z"/>
      </svg>
    </div>
    <div class="btn-label">
      <div>TikTok</div>
      <div class="btn-sub">@.cuverp</div>
    </div>
    <span class="copy-feedback" id="tiktok-feedback">Copied!</span>
  </button>

  <button class="copy-btn" onclick="copyUser('discord', 'kiskoo_', this)">
    <div class="icon-circle discord-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
    </div>
    <div class="btn-label">
      <div>Discord</div>
      <div class="btn-sub">kiskoo_</div>
    </div>
    <span class="copy-feedback" id="discord-feedback">Copied!</span>
  </button>
</div>

<script>
function copyUser(platform, username, btn) {
  navigator.clipboard.writeText(username).then(() => {
    const fb = document.getElementById(platform + '-feedback');
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 2000);
  });
}
</script>
    <div class="separator"></div>

    <div class="socials">

    </div>

    <div class="view-count">
        👁️ Views
    </div>
</div>

<script src="script.js"></script>
