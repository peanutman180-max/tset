<script>
  function copyUser(platform, username, btn) {
    navigator.clipboard.writeText(username).then(() => {
      const fb = document.getElementById(platform + '-feedback');
      fb.classList.add('show');
      btn.classList.add('copied');
      setTimeout(() => {
        fb.classList.remove('show');
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  let views = Math.floor(Math.random() * 900) + 100;
  document.getElementById('view-number').textContent = views.toLocaleString();

  // INTRO DRAG LOGIC
  const overlay = document.getElementById('intro-overlay');
  const bar = document.getElementById('drag-bar');
  let dragging = false;
  let startX = 0;

  bar.addEventListener('mousedown', (e) => { dragging = true; startX = e.clientX; });
  bar.addEventListener('touchstart', (e) => { dragging = true; startX = e.touches[0].clientX; });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const moved = e.clientX - startX;
    const pct = Math.min(100, Math.max(0, (moved / window.innerWidth) * 100));
    overlay.style.transform = `translateX(${pct}%)`;
    if (pct >= 60) finishReveal();
  });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const moved = e.touches[0].clientX - startX;
    const pct = Math.min(100, Math.max(0, (moved / window.innerWidth) * 100));
    overlay.style.transform = `translateX(${pct}%)`;
    if (pct >= 60) finishReveal();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    const current = parseFloat(overlay.style.transform.replace('translateX(', '') || '0');
    if (current < 60) {
      overlay.style.transition = 'transform 0.3s ease';
      overlay.style.transform = 'translateX(0)';
      setTimeout(() => overlay.style.transition = 'none', 300);
    } else finishReveal();
  });

  document.addEventListener('touchend', () => { dragging = false; });

  function finishReveal() {
    dragging = false;
    overlay.style.transition = 'transform 0.4s ease';
    overlay.style.transform = 'translateX(100%)';
    setTimeout(() => overlay.remove(), 500);
  }
</script>

<div id="stars"></div>
<script>
const starsContainer = document.getElementById("stars");

function createStar() {
    const star = document.createElement("div");
    star.classList.add("star");

    // random position
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";

    // random size
    const size = Math.random() * 4 + 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    // click effect
    star.addEventListener("click", () => {
        star.remove();
        createStar();
    });

    starsContainer.appendChild(star);
}

// create starting stars
for (let i = 0; i < 120; i++) {
    createStar();
}
</script>
