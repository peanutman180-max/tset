<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>peanutman180-max</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 28px;
      width: 340px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #333;
      margin-bottom: 12px;
    }

    h1 { font-size: 1.3rem; margin-bottom: 4px; }

    .online {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #4caf50;
      margin-bottom: 10px;
    }
    .online::before {
      content: '';
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
    }

    .bio {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    .tags {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 18px;
    }

    /* Copy buttons */
    .copy-row {
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-row:hover { background: #2a2a2a; }
    .copy-row .label { font-size: 0.75rem; color: #888; }
    .copy-row .value { font-size: 0.85rem; }
    .copy-row .copy-hint { font-size: 0.7rem; color: #555; }

    /* Links */
    .links {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 14px 0;
    }
    .links a {
      background: #222;
      border: 1px solid #333;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .links a:hover { background: #333; }

    /* Wish List Button */
    .wishlist-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #ff6b35, #ff3b3b);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .wishlist-btn:hover { opacity: 0.9; transform: scale(1.02); }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 28px 24px;
      width: 320px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal h2 {
      margin-bottom: 8px;
      font-size: 1.1rem;
    }
    .modal p {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 16px;
    }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      font-size: 0.85rem;
      margin-bottom: 12px;
      outline: none;
    }
    .modal input:focus { border-color: #ff6b35; }

    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-open {
      background: linear-gradient(135deg, #ff6b35, #ff3b3b);
      color: #fff;
    }
    .btn-open:hover { opacity: 0.85; }
    .btn-close {
      background: #333;
      color: #aaa;
    }
    .btn-close:hover { background: #3a3a3a; }

    /* Saved link display */
    .saved-link {
      margin-top: 10px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.75rem;
      color: #ff8c6b;
      word-break: break-all;
      text-align: left;
      display: none;
    }
    .saved-link a {
      color: #ff8c6b;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card">
  <img class="avatar" src="https://peanutman180-max.github.io/tset/cat.jpeg" alt="peanutman180-max" />
  <h1>peanutman180-max</h1>
  <div class="online">online</div>
  <p class="bio">come on fight me!!</p>
  <p class="tags">🇩🇪 Germany &nbsp;🎂 13 &nbsp;💡 always improving</p>

  <div class="copy-row" onclick="copyText('TikTok', '@.cuverp', this)">
    <div>
      <div class="label">TikTok</div>
      <div class="value">@.cuverp</div>
    </div>
    <div class="copy-hint">tap to copy</div>
  </div>

  <div class="copy-row" onclick="copyText('Discord', 'kiskoo_', this)">
    <div>
      <div class="label">Discord</div>
      <div class="value">kiskoo_</div>
    </div>
    <div class="copy-hint">tap to copy</div>
  </div>

  <div class="copy-row" onclick="copyText('Gmail', 'peanutman180@gmail.com', this)">
    <div>
      <div class="label">Gmail</div>
      <div class="value">peanutman180@gmail.com</div>
    </div>
    <div class="copy-hint">tap to copy</div>
  </div>

  <div class="links">
    <a href="https://github.com/peanutman180-max" target="_blank">GitHub</a>
    <a href="#">Discord</a>
  </div>

  <!-- Wish List Button -->
  <button class="wishlist-btn" onclick="openModal()">🎁 Wish List</button>
</div>

<!-- Wish List Modal -->
<div class="modal-overlay" id="wishlistModal">
  <div class="modal">
    <h2>🎁 My Wish List</h2>
    <p>Paste your Amazon wish list link below</p>
    <input type="url" id="wishlistInput" placeholder="https://www.amazon.com/hz/wishlist/..." />
    <div class="saved-link" id="savedLink">
      🔗 <a id="savedLinkAnchor" href="#" target="_blank">Open Wish List</a>
    </div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-open" onclick="saveLink()">Save & Open</button>
      <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  function copyText(label, text, el) {
    navigator.clipboard.writeText(text).then(() => {
      const hint = el.querySelector('.copy-hint');
      hint.textContent = 'Copied!';
      setTimeout(() => hint.textContent = 'tap to copy', 1500);
    });
  }

  function openModal() {
    document.getElementById('wishlistModal').classList.add('open');
    // Load saved link if any
    const saved = localStorage.getItem('wishlistUrl');
    if (saved) {
      document.getElementById('wishlistInput').value = saved;
      showSavedLink(saved);
    }
  }

  function closeModal() {
    document.getElementById('wishlistModal').classList.remove('open');
  }

  function saveLink() {
    const url = document.getElementById('wishlistInput').value.trim();
    if (!url) return;
    localStorage.setItem('wishlistUrl', url);
    showSavedLink(url);
    window.open(url, '_blank');
  }

  function showSavedLink(url) {
    const div = document.getElementById('savedLink');
    const anchor = document.getElementById('savedLinkAnchor');
    anchor.href = url;
    anchor.textContent = url.length > 40 ? url.slice(0, 40) + '…' : url;
    div.style.display = 'block';
  }

  // Close modal on overlay click
  document.getElementById('wishlistModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
